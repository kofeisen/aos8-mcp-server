# Usage:
#   cp aos8.devices.example.yaml aos8.devices.yaml
#   Edit aos8.devices.yaml and fill in the real IP and password (this file is already in .gitignore)
# Or specify the path through the environment variable AOS8_DEVICES_CONFIG=/path/to/your.yaml.

verify_ssl: false

mm:
  ip: "10.0.50.1"
  username: "admin"
  password: "CHANGE_ME"

# Try falling back to MD in order (same behavior as on MM with conductor restrictions).
# If a MD omits username / password, use the same account as MM.
md:
  - ip: "10.0.50.11"
  - ip: "10.0.50.12"
